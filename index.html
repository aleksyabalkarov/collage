<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Честит 1 юни</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@700&family=Nunito:wght@300;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
  }

  .poster {
    width: 430px;
    min-height: 932px;
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1b5e 30%, #1a0a2e 60%, #0d1a3a 100%);
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    padding: 0;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  }

  /* Bokeh bubbles */
  .bubble {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: floatBubble linear infinite;
    opacity: 0;
  }
  @keyframes floatBubble {
    0%   { transform: translateY(0) scale(0.8); opacity: 0; }
    15%  { opacity: 1; }
    85%  { opacity: 0.6; }
    100% { transform: translateY(-1000px) scale(1.2); opacity: 0; }
  }

  /* Stars */
  .stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,220,100,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 25%, rgba(255,180,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(200,220,255,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 5% 80%, rgba(255,255,200,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 90%, rgba(255,200,255,0.7) 0%, transparent 100%),
      radial-gradient(2px 2px at 50% 30%, rgba(255,240,150,0.9) 0%, transparent 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Header */
  .header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 36px 20px 16px;
  }

  .date-badge {
    display: inline-block;
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f9c74f;
    background: rgba(249,199,79,0.12);
    border: 1px solid rgba(249,199,79,0.3);
    border-radius: 30px;
    padding: 5px 16px;
    margin-bottom: 14px;
    animation: fadeInDown 0.8s ease both;
  }

  .main-title {
    font-family: 'Dancing Script', cursive;
    font-size: 52px;
    font-weight: 700;
    line-height: 1.1;
    background: linear-gradient(135deg, #f9c74f, #f8961e, #f4a261, #e9c46a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeInDown 0.8s 0.2s ease both;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(249,199,79,0.4));
  }

  .subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    margin-top: 6px;
    animation: fadeInDown 0.8s 0.35s ease both;
  }

  /* Photo Grid */
  .grid {
    position: relative;
    z-index: 10;
    padding: 10px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto;
    gap: 8px;
    animation: fadeIn 1s 0.5s ease both;
  }

  .photo-card {
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    border: 1.5px solid rgba(255,255,255,0.08);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .photo-card:hover {
    transform: scale(1.02) translateY(-2px);
    box-shadow: 0 14px 36px rgba(249,199,79,0.25);
  }

  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
  }

  .photo-card:hover img {
    transform: scale(1.06);
  }

  /* Photo overlay shimmer */
  .photo-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
  }

  /* Layout sizes */
  .card-wide { grid-column: span 2; height: 200px; }
  .card-tall { grid-row: span 2; }
  .card-normal { height: 155px; }
  .card-sm { height: 130px; }
  .card-med { height: 170px; }

  /* Divider */
  .divider {
    position: relative;
    z-index: 10;
    margin: 12px 30px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(249,199,79,0.4), transparent);
  }

  /* Footer */
  .footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 14px 20px 28px;
  }

  .hearts {
    font-size: 22px;
    letter-spacing: 6px;
    margin-bottom: 8px;
    animation: heartbeat 1.5s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  .footer-text {
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  /* Corner decorations */
  .corner-deco {
    position: absolute;
    pointer-events: none;
    z-index: 2;
  }
  .corner-deco.tl { top: 8px; left: 8px; }
  .corner-deco.tr { top: 8px; right: 8px; transform: scaleX(-1); }

  /* Confetti dots */
  .confetti-dot {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    animation: twinkle 2s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Glow ring around poster */
  .poster::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 26px;
    background: linear-gradient(135deg, #f9c74f33, #9b5de522, #f8961e33, #4cc9f033);
    z-index: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="poster" id="poster">
  <div class="stars"></div>

  <!-- Confetti dots -->
  <div class="confetti-dot" style="width:6px;height:6px;background:#f9c74f;top:18%;left:8%;animation-delay:0.3s"></div>
  <div class="confetti-dot" style="width:4px;height:4px;background:#f4a261;top:12%;right:12%;animation-delay:0.8s"></div>
  <div class="confetti-dot" style="width:5px;height:5px;background:#90e0ef;top:48%;right:5%;animation-delay:1.2s"></div>
  <div class="confetti-dot" style="width:4px;height:4px;background:#f9c74f;top:75%;left:6%;animation-delay:0.5s"></div>
  <div class="confetti-dot" style="width:7px;height:7px;background:#c77dff;top:85%;right:8%;animation-delay:1.5s"></div>
  <div class="confetti-dot" style="width:3px;height:3px;background:#fff;top:92%;left:20%;animation-delay:0.2s"></div>

  <!-- Floating bubbles -->
  <div class="bubble" style="width:80px;height:80px;background:radial-gradient(circle,rgba(249,199,79,0.15),transparent);left:5%;animation-duration:8s;animation-delay:0s"></div>
  <div class="bubble" style="width:50px;height:50px;background:radial-gradient(circle,rgba(199,125,255,0.12),transparent);left:75%;animation-duration:11s;animation-delay:2s"></div>
  <div class="bubble" style="width:35px;height:35px;background:radial-gradient(circle,rgba(144,224,239,0.15),transparent);left:40%;animation-duration:9s;animation-delay:4s"></div>

  <!-- Header -->
  <div class="header">
    <div class="date-badge">✦ 1 ЮНИ 2025 ✦</div>
    <div class="main-title">Честит<br>Ден на<br>Детето!</div>
    <div class="subtitle">с любов и радост</div>
  </div>

  <!-- Photo Grid -->
  <div class="grid">
    <!-- Row 1: wide hero -->
    <div class="photo-card card-wide">
      <img src="/mnt/user-data/uploads/20210723_173658.jpg" alt="Слънчогледи">
    </div>

    <!-- Row 2: two normal -->
    <div class="photo-card card-normal">
      <img src="/mnt/user-data/uploads/20150519_080035.jpg" alt="">
    </div>
    <div class="photo-card card-normal">
      <img src="/mnt/user-data/uploads/20190825_183212.jpg" alt="">
    </div>

    <!-- Row 3: tall left + two stacked right -->
    <div class="photo-card card-med" style="grid-row: span 1;">
      <img src="/mnt/user-data/uploads/9AD5FD54-F3C8-4A2C-B7D5-7C99219E6BAB.JPG" alt="">
    </div>
    <div class="photo-card card-sm">
      <img src="/mnt/user-data/uploads/20150520_074951.jpg" alt="">
    </div>

    <!-- Row 4 -->
    <div class="photo-card card-sm">
      <img src="/mnt/user-data/uploads/20200516_161439.jpg" alt="">
    </div>
    <div class="photo-card card-sm">
      <img src="/mnt/user-data/uploads/20191224_223312.jpg" alt="">
    </div>

    <!-- Row 5: wide -->
    <div class="photo-card card-wide" style="height:180px;">
      <img src="/mnt/user-data/uploads/20220916_203032.jpg" alt="">
    </div>

    <!-- Row 6: two -->
    <div class="photo-card card-normal">
      <img src="/mnt/user-data/uploads/20210130_181654.jpg" alt="">
    </div>
    <div class="photo-card card-normal">
      <img src="/mnt/user-data/uploads/IMG-1a68fee69b4e1da4fbf108a60e379513-V.jpg" alt="">
    </div>
  </div>

  <div class="divider"></div>

  <!-- Footer -->
  <div class="footer">
    <div class="hearts">🌻 💛 🌼</div>
    <div class="footer-text">Растете щастливи · обичани · свободни</div>
  </div>
</div>

</body>
</html>
