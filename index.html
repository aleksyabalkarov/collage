<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Честит 1 юни</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@300;600&family=Playfair+Display:ital@1&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0d0820;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px 10px;
    font-family: sans-serif;
  }

  .poster {
    width: 420px;
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1b5e 35%, #1a0a2e 65%, #0d1a3a 100%);
    border-radius: 28px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 60px rgba(249,199,79,0.08);
  }

  /* Stars background */
  .stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle 2s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity:0.2; transform:scale(1); }
    50% { opacity:0.9; transform:scale(1.4); }
  }

  /* Header */
  .header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 32px 20px 18px;
  }

  .badge {
    display: inline-block;
    font-family: 'Nunito', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: #f9c74f;
    border: 1px solid rgba(249,199,79,0.35);
    border-radius: 30px;
    padding: 5px 16px;
    margin-bottom: 16px;
    animation: fadeDown 0.8s ease both;
  }

  .title {
    font-family: 'Dancing Script', cursive;
    font-size: 56px;
    line-height: 1.05;
    background: linear-gradient(135deg, #f9c74f 0%, #f8961e 50%, #e9c46a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 24px rgba(249,199,79,0.35));
    animation: fadeDown 0.8s 0.15s ease both;
  }

  .sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1.5px;
    margin-top: 8px;
    animation: fadeDown 0.8s 0.3s ease both;
  }

  /* Grid */
  .grid {
    position: relative;
    z-index: 10;
    padding: 4px 14px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .p {
    border-radius: 14px;
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,0.07);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    position: relative;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .p:hover { transform: scale(1.02) translateY(-2px); box-shadow: 0 12px 32px rgba(249,199,79,0.2); }

  .p img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .p::after {
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,0.3) 100%);
    pointer-events:none;
  }

  .wide { grid-column: span 2; height: 195px; }
  .h155 { height: 155px; }
  .h135 { height: 135px; }
  .h165 { height: 165px; }
  .h175 { height: 175px; }

  /* Divider */
  .divider {
    position: relative;
    z-index: 10;
    margin: 16px 28px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(249,199,79,0.45), transparent);
  }

  /* Footer */
  .footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 4px 20px 30px;
  }

  .hearts {
    font-size: 24px;
    letter-spacing: 8px;
    margin-bottom: 10px;
    display: block;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform:scale(1); }
    50% { transform:scale(1.1); }
  }

  .footer-text {
    font-family: 'Nunito', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  /* Floating confetti dots */
  .dot {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
    animation: twinkle 2s ease-in-out infinite;
  }

  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-18px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
